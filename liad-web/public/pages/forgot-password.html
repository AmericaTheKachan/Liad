<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar senha | LIAD</title>
    <meta
      name="description"
      content="Redefina o acesso à sua conta LIAD informando o email cadastrado."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <script src="/assets/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/assets/js/forgot-password.js"></script>
  </head>
  <body class="bg-liad-bg font-body text-liad-text antialiased">
    <main class="liad-auth-shell min-h-screen px-5 py-10 sm:px-8 flex items-center justify-center">
      <div class="w-full max-w-[440px]">

        <a
          href="/"
          class="inline-flex items-center font-display text-xl font-extrabold tracking-[-0.06em] text-transparent bg-gradient-to-r from-liad-purple to-liad-blue bg-clip-text mb-8"
        >
          LIAD
        </a>

        <section class="rounded-[32px] border border-white/10 bg-[rgba(19,19,21,0.88)] p-6 shadow-panel sm:p-8 lg:p-10">

          <!-- ── Step 1: solicitar email ───────────────────────────── -->
          <div data-step="request">

            <a href="/login" data-back class="inline-flex items-center gap-1.5 text-liad-muted text-xs font-medium mb-7 transition hover:text-liad-text">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M9 11L5 7L9 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Voltar para login
            </a>

            <div class="flex items-center justify-center w-13 h-13 rounded-2xl border border-liad-purple/20 bg-liad-purple/10 mb-6" style="width:3.25rem;height:3.25rem;" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="5" width="18" height="13" rx="2.5" stroke="rgb(204 151 255)" stroke-width="1.5"/>
                <path d="M2 8.5l9 5.5 9-5.5" stroke="rgb(204 151 255)" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>

            <h2 class="font-display text-[2rem] font-extrabold tracking-[-0.05em] text-liad-text leading-none mb-3">
              Recuperar senha
            </h2>
            <p class="text-sm leading-6 text-liad-muted mb-7">
              Informe o email cadastrado. Enviaremos um link para você redefinir sua senha.
            </p>

            <div data-banner hidden class="mb-5 rounded-2xl border border-[#ff8439]/40 bg-[#ff8439]/10 px-4 py-3 text-sm text-[#ffd5bd] leading-relaxed"></div>

            <form data-request-form class="space-y-5" novalidate>
              <div>
                <label for="email" class="mb-2 block text-sm font-medium text-liad-text">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="seuemail@email.com"
                  class="liad-input"
                  required
                />
              </div>
              <button
                type="submit"
                data-submit
                class="w-full rounded-2xl bg-gradient-to-r from-liad-violet to-liad-purple px-5 py-3.5 font-display text-base font-bold text-black transition hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:translate-y-0"
              >
                Enviar link de redefinição
              </button>
            </form>

            <p class="mt-6 text-sm text-liad-muted">
              Lembrou a senha?
              <a href="/login" class="font-semibold text-liad-purple">Entrar na conta</a>
            </p>

          </div>

          <!-- ── Step 2: email enviado ──────────────────────────────── -->
          <div data-step="sent" hidden>

            <div class="flex items-center justify-center rounded-2xl border mb-6" style="width:3.25rem;height:3.25rem;border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.08);" aria-hidden="true">
              <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path data-check-path d="M6 13.5L10.5 18L20 8" stroke="rgb(52 211 153)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>

            <h2 class="font-display text-[2rem] font-extrabold tracking-[-0.05em] text-liad-text leading-none mb-3">
              Email enviado
            </h2>
            <p class="text-sm leading-6 text-liad-muted mb-7">
              Enviamos um link para <strong data-sent-email class="font-semibold text-liad-text">—</strong>. Verifique sua caixa de entrada e a pasta de spam.
            </p>

            <div data-banner-sent hidden class="mb-5 rounded-2xl border border-[#ff8439]/40 bg-[#ff8439]/10 px-4 py-3 text-sm text-[#ffd5bd] leading-relaxed"></div>

            <div class="flex items-center justify-between pt-5 border-t border-white/[0.06] text-xs text-liad-muted">
              <span>Não recebeu o email?</span>
              <button
                data-resend
                disabled
                class="font-semibold text-liad-purple disabled:opacity-40 disabled:cursor-not-allowed hover:underline"
              >
                Reenviar <span data-countdown>(60s)</span>
              </button>
            </div>

            <p class="mt-6 text-sm text-liad-muted">
              <a href="/login" class="font-semibold text-liad-purple">← Voltar para login</a>
            </p>

          </div>

        </section>
      </div>
    </main>
  </body>
</html>
